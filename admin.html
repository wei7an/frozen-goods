<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 — 四川冻货批发</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Storage Warning -->
  <div class="storage-warning" id="storageWarning">
    您的浏览器不支持数据存储，管理功能不可用。
  </div>

  <!-- SVG Icon Sprite -->
  <svg style="display:none" aria-hidden="true">
    <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="icon-close" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-eye" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="icon-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="16 17 21 12 16 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  </svg>

  <!-- Login Gate -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">❄</div>
      <h1>后台管理</h1>
      <p class="login-subtitle">四川冻货批发管理系统</p>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="loginPassword">管理密码</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="请输入管理密码" required autofocus>
          <p class="form-error" id="loginError"></p>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">登 录</button>
      </form>
      <p class="login-hint" id="loginHint"></p>
      <button class="btn-ghost btn-sm" id="resetPwdBtn" style="margin-top:var(--space-sm)">忘记密码？重置</button>
    </div>
  </div>

  <!-- Admin Interface (hidden until login) -->
  <div class="admin-wrapper" id="adminWrapper" style="display:none">

    <!-- Admin Header -->
    <header class="admin-header">
      <div class="admin-header-inner">
        <div class="admin-brand">
          <span>❄</span>
          <strong>四川冻货批发 — 后台管理</strong>
        </div>
        <div class="admin-header-actions">
          <button class="btn btn-ghost btn-sm" id="exportDataBtn" style="color:var(--color-success)">📤 导出数据</button>
          <button class="btn btn-ghost btn-sm" id="migrateOpenBtn" style="color:var(--color-warning)">📦 图片迁移</button>
          <a href="index.html" class="btn btn-ghost btn-sm" target="_blank">
            <svg width="16" height="16"><use href="#icon-eye"/></svg> 查看前台
          </a>
          <button class="btn btn-ghost btn-sm" id="changePwdBtn">修改密码</button>
          <button class="btn btn-ghost btn-sm" id="logoutBtn">
            <svg width="16" height="16"><use href="#icon-logout"/></svg> 退出
          </button>
        </div>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="admin-toolbar">
      <div class="container toolbar-inner">
        <div class="toolbar-search">
          <svg width="16" height="16" class="toolbar-search-icon"><use href="#icon-search"/></svg>
          <input type="text" class="form-input" id="adminSearch" placeholder="搜索产品...">
        </div>
        <div class="toolbar-actions">
          <select class="form-input" id="adminCategoryFilter" style="width:auto">
            <option value="all">全部分类</option>
          </select>
          <button class="btn btn-primary" id="addProductBtn">
            <svg width="16" height="16"><use href="#icon-plus"/></svg> 添加产品
          </button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="container">
      <div class="stats-bar" id="statsBar"></div>
    </div>

    <!-- Image Migration Panel -->
    <div class="container" id="migratePanel" style="display:none">
      <div class="migrate-card">
        <div class="migrate-header">
          <h2>📦 图片导出迁移</h2>
          <p>将产品中的 base64 图片导出为文件，替换为本地路径以释放存储空间</p>
          <div class="migrate-actions">
            <button class="btn btn-primary btn-sm" id="migrateAllBtn">⬇ 一键全部下载</button>
            <button class="btn btn-outline btn-sm" id="migrateCloseBtn">关闭</button>
          </div>
        </div>
        <p class="migrate-hint">下载的图片会保存到浏览器的默认下载目录，请将所有图片移动到项目的 <code>images/</code> 文件夹中。</p>
        <div class="migrate-list" id="migrateList"></div>
      </div>
    </div>

    <!-- Product Table -->
    <div class="container">
      <div class="table-wrapper">
        <table class="product-table" id="productTable">
          <thead>
            <tr>
              <th style="width:60px">图片</th>
              <th>产品名称</th>
              <th>分类</th>
              <th>规格</th>
              <th>库存</th>
              <th style="width:110px">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="table-empty" id="tableEmpty" style="display:none">
          暂无产品数据，<button class="btn btn-primary btn-sm" id="addFirstBtn">添加第一款产品</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Form Modal -->
  <div class="modal-overlay" id="formModal">
    <div class="modal-content">
      <button class="modal-close" id="formModalClose" aria-label="关闭">
        <svg width="18" height="18"><use href="#icon-close"/></svg>
      </button>
      <div class="modal-body">
        <h2 id="formModalTitle">添加产品</h2>
        <form id="productForm" novalidate>
          <input type="hidden" id="formProductId">

          <div class="form-row">
            <div class="form-group" style="flex:2">
              <label class="required">产品名称</label>
              <input type="text" class="form-input" id="formName" required placeholder="如：冷冻猪五花肉">
              <p class="form-error">请输入产品名称</p>
            </div>
            <div class="form-group" style="flex:1">
              <label class="required">产品分类</label>
              <select class="form-input" id="formCategory" required></select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group" style="flex:1">
              <label class="required">单位</label>
              <select class="form-input" id="formUnit" required></select>
            </div>
            <div class="form-group" style="flex:1">
              <label class="required">库存状态</label>
              <select class="form-input" id="formStock" required></select>
            </div>
          </div>

          <div class="form-group">
            <label class="required">规格</label>
            <input type="text" class="form-input" id="formSpecs" required placeholder="如：500g/袋">
            <p class="form-error">请输入产品规格</p>
          </div>

          <div class="form-group">
            <label>产品描述</label>
            <textarea class="form-input" id="formDescription" rows="3" placeholder="产品特点、烹饪建议等"></textarea>
          </div>

          <div class="form-group">
            <label>图片</label>
            <div class="image-input-row">
              <input type="url" class="form-input" id="formImageUrl" placeholder="输入图片URL 或 点击右侧按钮上传本地照片">
              <input type="file" class="file-input" id="formImageFile" accept="image/*" style="display:none">
              <button type="button" class="btn btn-outline btn-sm" id="formImageUploadBtn">📁 本地上传</button>
            </div>
            <p class="form-error">请输入图片URL 或 上传本地图片</p>
            <div class="image-preview" id="imagePreview" style="display:none">
              <img id="imagePreviewImg" alt="预览">
            </div>
          </div>

          <div class="form-group" style="margin-bottom:0">
            <label style="display:flex;align-items:center;gap:var(--space-sm);cursor:pointer">
              <input type="checkbox" id="formFeatured"> 首页推荐（在首页显著位置展示）
            </label>
          </div>

          <div style="display:flex;gap:var(--space-md);margin-top:var(--space-lg)">
            <button type="submit" class="btn btn-primary" style="flex:1">保存</button>
            <button type="button" class="btn btn-outline" id="formCancelBtn" style="flex:1">取消</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-overlay" id="pwdModal">
    <div class="modal-content">
      <button class="modal-close" id="pwdModalClose" aria-label="关闭">
        <svg width="18" height="18"><use href="#icon-close"/></svg>
      </button>
      <div class="modal-body">
        <h2>修改密码</h2>
        <form id="pwdForm" novalidate>
          <div class="form-group">
            <label class="required">当前密码</label>
            <input type="password" class="form-input" id="pwdCurrent" required>
            <p class="form-error">请输入当前密码</p>
          </div>
          <div class="form-group">
            <label class="required">新密码</label>
            <input type="password" class="form-input" id="pwdNew" required minlength="4">
            <p class="form-error">密码至少4位</p>
          </div>
          <div class="form-group">
            <label class="required">确认新密码</label>
            <input type="password" class="form-input" id="pwdConfirm" required>
            <p class="form-error">两次密码不一致</p>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">确认修改</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="data/products.js"></script>
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
